spring:
  application:
    name: lifesaga-ddd
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/LifeSagaNew?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  sql:
    init:
      mode: never

server:
  port: 3000

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.lovelin.lifesaga.saga.domain.model
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  connect-timeout: ${WECHAT_CONNECT_TIMEOUT:5s}
  read-timeout: ${WECHAT_READ_TIMEOUT:5s}

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:604800000}

upload:
  dir: ${UPLOAD_DIR:./uploads}
  public-base-url: ${UPLOAD_PUBLIC_URL:}

auth:
  dev-login-enabled: ${AUTH_DEV_LOGIN:false}
