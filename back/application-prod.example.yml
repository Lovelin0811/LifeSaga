spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/LifeSagaNew?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000
    username: your_db_username
    password: your_db_password

wechat:
  app-id: your_wechat_app_id
  app-secret: your_wechat_app_secret
  connect-timeout: 5s
  read-timeout: 5s

jwt:
  secret: replace_with_a_strong_random_secret_at_least_32_bytes
  expiration: 604800000

upload:
  dir: /opt/lifesaga/uploads
  public-base-url: https://lovelin.com.cn

auth:
  dev-login-enabled: false
