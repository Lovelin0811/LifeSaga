server:
  port: 3000

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/lifesaga?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000
    username: ${DB_USERNAME:your_db_username}
    password: ${DB_PASSWORD:your_db_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

wechat:
  app-id: ${WECHAT_APP_ID:your_wechat_app_id}
  app-secret: ${WECHAT_APP_SECRET:your_wechat_app_secret}

upload:
  dir: ${UPLOAD_DIR:./uploads}
  public-base-url: ${UPLOAD_PUBLIC_BASE_URL:}

jwt:
  # 至少 32 字符的随机密钥，生产环境必须通过环境变量 JWT_SECRET 设置
  secret: ${JWT_SECRET:your_jwt_secret_key_at_least_32_chars}
  expiration: 604800000

logging:
  level:
    com.lovelin.lifesaga: INFO

auth:
  dev-login-enabled: ${AUTH_DEV_LOGIN_ENABLED:false}
