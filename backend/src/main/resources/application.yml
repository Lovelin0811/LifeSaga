server:
  port: 3000

spring:
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/lifesaga?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}

upload:
  dir: ${UPLOAD_DIR:./uploads}

jwt:
  secret: ${JWT_SECRET:}
  expiration: 604800000

logging:
  level:
    com.lovelin.lifesaga: DEBUG
